<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — AuthNex</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #authnex-widget { width: 100%; max-width: 440px; }
    .hosted-error {
      text-align: center;
      padding: 32px;
      color: #dc2626;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="authnex-widget"></div>

  <script src="https://sdk.authnex.dev/js/v1/authnex.min.js"></script>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const tenant = params.get('tenant');
      const redirect = params.get('redirect');
      const mode = params.get('mode') || 'login';
      const theme = params.get('theme') || 'light';

      if (!tenant) {
        document.getElementById('authnex-widget').innerHTML =
          '<div class="hosted-error">Missing <code>tenant</code> parameter.</div>';
        return;
      }

      if (theme === 'dark') {
        document.body.style.background = '#0f172a';
      }

      AuthNex.init({
        container: '#authnex-widget',
        apiUrl: 'https://api.authnex.dev',
        tenant: tenant,
        theme: theme,
        mode: mode,
        onSuccess: function(user, tokens) {
          if (!redirect) return;
          // Pass tokens back via URL fragment
          var fragment = '#access_token=' + encodeURIComponent(tokens.access_token || '');
          if (tokens.refresh_token) {
            fragment += '&refresh_token=' + encodeURIComponent(tokens.refresh_token);
          }
          fragment += '&user=' + encodeURIComponent(JSON.stringify({
            id: user.id,
            email: user.email,
            email_verified: user.email_verified,
          }));
          window.location.href = redirect + fragment;
        },
        onError: function(error) {
          console.error('AuthNex hosted login error:', error);
        },
      });
    })();
  </script>
</body>
</html>
